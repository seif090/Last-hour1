# ================================================================
# LAST HOUR — Production Override
# ================================================================
# Usage: docker compose -f docker-compose.yml -f docker-compose.prod.yml up -d

version: "3.9"

x-logging: &logging
  driver: "awslogs"
  options:
    awslogs-group: "/ecs/lasthour-production"
    awslogs-region: "me-south-1"
    awslogs-stream-prefix: "backend"

services:

  backend:
    build:
      target: production
    restart: always
    environment:
      NODE_ENV: production
      LOG_LEVEL: warn
    logging: *logging
    deploy:
      resources:
        limits:
          cpus: "2"
          memory: 2G
        reservations:
          cpus: "1"
          memory: 1G
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:3000/api/v1/health', r => {process.exit(r.statusCode===200?0:1)})"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 30s
    # No volume mounts in production — image includes compiled code

  postgres:
    restart: always
    deploy:
      resources:
        limits:
          memory: 4G
    volumes:
      - pgdata:/var/lib/postgresql/data
    # Production: use AWS RDS instead of container Postgres

  redis:
    restart: always
    command: >
      redis-server
      --appendonly yes
      --appendfsync everysec
      --maxmemory 512mb
      --maxmemory-policy allkeys-lru
      --requirepass ${REDIS_PASSWORD}
    deploy:
      resources:
        limits:
          memory: 1G
    # Production: use AWS ElastiCache instead of container Redis
