name: CD

on:
  push:
    branches: [main, staging]
    paths:
      - 'backend/**'
      - 'iac/**'
      - 'docker-compose.yml'
      - 'Dockerfile'

env:
  AWS_REGION: me-south-1
  ECR_REPOSITORY: lasthour-backend

jobs:
  deploy:
    name: Deploy to ECS
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Set environment
        id: env
        run: |
          if [[ "${{ github.ref_name }}" == "main" ]]; then
            echo "cluster=lasthour-production" >> $GITHUB_OUTPUT
            echo "service=lasthour-production-backend-service" >> $GITHUB_OUTPUT
            echo "task-def=iac/task-definition.json" >> $GITHUB_OUTPUT
          else
            echo "cluster=lasthour-staging" >> $GITHUB_OUTPUT
            echo "service=lasthour-staging-backend-service" >> $GITHUB_OUTPUT
            echo "task-def=iac/task-definition-staging.json" >> $GITHUB_OUTPUT
          fi

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build, tag, and push image to ECR
        id: build-image
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          IMAGE_TAG: ${{ github.sha }}
        run: |
          docker build -t $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG \
            -t $ECR_REGISTRY/$ECR_REPOSITORY:latest \
            --target production ./backend
          docker push --all-tags $ECR_REGISTRY/$ECR_REPOSITORY
          echo "image=$ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG" >> $GITHUB_OUTPUT

      - name: Render ECS task definition
        id: render-task-def
        uses: aws-actions/amazon-ecs-render-task-definition@v1
        with:
          task-definition: ${{ steps.env.outputs.task-def }}
          container-name: lasthour-backend
          image: ${{ steps.build-image.outputs.image }}

      - name: Deploy to ECS
        uses: aws-actions/amazon-ecs-deploy-task-definition@v2
        with:
          task-definition: ${{ steps.render-task-def.outputs.task-definition }}
          service: ${{ steps.env.outputs.service }}
          cluster: ${{ steps.env.outputs.cluster }}
          wait-for-service-stability: true

      - name: Verify deployment
        run: |
          aws ecs describe-services \
            --cluster ${{ steps.env.outputs.cluster }} \
            --services ${{ steps.env.outputs.service }} \
            --query 'services[0].{status:status,desired:desiredCount,running:runningCount,pending:pendingCount}'
