name: lasthour_customer
description: Last Hour — Customer mobile app
version: 1.0.0
publish_to: none

environment:
  sdk: '>=3.2.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_bloc: ^8.1.5
  equatable: ^2.0.5
  get_it: ^7.6.7
  dio: ^5.4.0
  go_router: ^13.0.0
  flutter_secure_storage: ^9.0.0
  google_maps_flutter: ^2.5.3
  geolocator: ^10.1.0
  web_socket_channel: ^2.4.0
  rxdart: ^0.27.7
  connectivity_plus: ^6.0.0

  lasthour_shared:
    path: ../shared

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.1

flutter:
  uses-material-design: true
  # To use Poppins fonts, download from https://fonts.google.com/specimen/Poppins
  # and place .ttf files in assets/fonts/, then uncomment below:
  # fonts:
  #   - family: Poppins
  #     fonts:
  #       - asset: assets/fonts/Poppins-Regular.ttf
  #       - asset: assets/fonts/Poppins-Bold.ttf
  #         weight: 700
  #       - asset: assets/fonts/Poppins-SemiBold.ttf
  #         weight: 600
