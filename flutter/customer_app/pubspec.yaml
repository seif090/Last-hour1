name: lasthour_customer
description: Last Hour — Customer App
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.2.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # State Management
  flutter_bloc: ^8.1.3
  bloc: ^8.1.2
  equatable: ^2.0.5

  # Networking
  dio: ^5.4.0
  web_socket_channel: ^2.4.0

  # Location & Maps
  geolocator: ^10.1.0
  google_maps_flutter: ^2.5.3
  google_maps_flutter_web: ^0.5.4+2

  # Payments
  stripe_android: ^20.23.0
  stripe_ios: ^20.23.0
  stripe_platform_interface: ^10.5.0

  # Firebase
  firebase_core: ^2.25.4
  firebase_messaging: ^14.7.19

  # UI
  cached_network_image: ^3.3.0
  shimmer: ^3.0.0
  intl: ^0.19.0
  flutter_svg: ^2.0.9
  loading_animation_widget: ^1.2.0+4

  # Utilities
  flutter_secure_storage: ^9.0.0
  rxdart: ^0.28.0
  get_it: ^7.6.7
  path_provider: ^2.1.1
  image_picker: ^1.0.7
  timeago: ^3.6.1

  # Routing
  go_router: ^14.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  bloc_test: ^9.1.4
  mocktail: ^1.0.1
  flutter_lints: ^3.0.1

flutter:
  uses-material-design: true

  fonts:
    - family: Inter
      fonts:
        - asset: assets/fonts/Inter-Regular.ttf
        - asset: assets/fonts/Inter-Medium.ttf
          weight: 500
        - asset: assets/fonts/Inter-SemiBold.ttf
          weight: 600
        - asset: assets/fonts/Inter-Bold.ttf
          weight: 700

  assets:
    - assets/images/
    - assets/icons/
